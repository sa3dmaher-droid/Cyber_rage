<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <!-- 🔍 الأسطر الخاصة بمحرك البحث جوجل -->
    <title>Cyber Rage - لعبة الأكشن والنيون المباشرة</title>
    <meta name="description" content="لعبة Cyber Rage هي لعبة قتال وأكشن نيون ممتعة ومجانية، تعمل على الكمبيوتر والموبايل مباشرة عبر المتصفح دون الحاجة لتحميل.">
    <meta name="keywords" content="Cyber Rage, cyber rage game, لعبة سايبر ريج, العاب نيون, العاب متصفح, sa3dmaher, العاب مجانية">
    <meta name="author" content="sa3dmaher">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الواجهة العليا HUD -->
    <div id="hud">
        <div class="hud-card">
            <div>النتيجة: <span id="score-text" style="color:#00f0ff; font-weight:bold;">0</span></div>
            <div>الكومبو: <span id="combo-text" style="color:#ff0055; font-weight:bold;">x1</span></div>
        </div>
        <div class="hud-card">
            <div>الصحة (Health)</div>
            <div class="bar-container"><div id="health-fill" class="bar-fill"></div></div>
            <div style="margin-top:6px;">الغضب الخارق (Rage)</div>
            <div class="bar-container"><div id="rage-fill" class="bar-fill"></div></div>
        </div>
    </div>

    <!-- شريط صحة الزعيم -->
    <div id="boss-hud">
        <div style="color:#ff0055; font-weight:bold; margin-bottom:4px;">⚠️ الزعيم الأسطوري (BOSS)</div>
        <div id="boss-bar-bg"><div id="boss-bar-fill"></div></div>
    </div>

    <!-- شاشة البداية -->
    <div id="start-screen" class="overlay">
        <h1 class="title">CYBER RAGE</h1>
        <p class="desc">استخدم الأسهم أو حروف WASD للحركة، والماوس للتوجيه وإطلاق النار.<br>اضغط <b>Shift</b> للاندفاع الخاطف (Dash)، و <b>Space</b> لتفعيل الهجوم الخارق (Ultimate)!</p>
        <button class="btn" onclick="startGame()">ابدأ المعركة 🔥</button>
    </div>

    <!-- شاشة الخسارة -->
    <div id="game-over-screen" class="overlay" style="display: none;">
        <h1 class="title" style="color:#ff0055; text-shadow:0 0 20px #ff0055;">انتهت المعركة</h1>
        <p class="desc">النتيجة النهائية: <span id="final-score" style="color:#00f0ff; font-weight:bold;">0</span></p>
        <button class="btn" onclick="restartGame()">إعادة المحاولة 🔄</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- عناصر تحكم لمسية للموبايل -->
    <div id="mobile-ui">
        <!-- أزرار الحركة اليسرى -->
        <div class="touch-group" style="display: grid; grid-template-columns: repeat(3, 50px); gap: 5px;">
            <div></div><div class="touch-btn" id="btn-up">▲</div><div></div>
            <div class="touch-btn" id="btn-left">◀</div><div class="touch-btn" id="btn-down">▼</div><div class="touch-btn" id="btn-right">▶</div>
        </div>

        <!-- أزرار الهجوم اليمنى -->
        <div class="touch-group" style="display: flex; gap: 12px; align-items: flex-end;">
            <div class="touch-btn action-btn" id="btn-dash" style="border-color:#00f0ff; color:#00f0ff;">DASH</div>
            <div class="touch-btn action-btn" id="btn-ult">ULT</div>
            <div class="touch-btn shoot-btn" id="btn-shoot">🔥<br>FIRE</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
